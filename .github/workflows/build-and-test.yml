name: Build and test
on: [ push ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: npm run test:integration
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        with:
          name: e2e-videos
          path: cypress/videos/
